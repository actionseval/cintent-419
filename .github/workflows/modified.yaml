name: Unit Tests

# CINTENT >> MANUAL_TRIGGER
# on:
#   push:
#   pull_request:
#     types: [opened, reopened]
on: [repository_dispatch, workflow_dispatch]

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # CINTENT >> REMOVE_MATRIX
        # python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        python-version: ['3.12']

        # CINTENT >> UNSUPPORTED_OS
        os: [ubuntu-latest]

        # CINTENT >> REMOVE_MATRIX
        # include:
        #   - os: macos-latest
        #     python-version: '3.8'
        #   - os: macos-latest
        #     python-version: '3.12'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # CINTENT >> INSERT_CINTENT
    - uses: JavidDitty/setup-cintent@3e5b2faf83a2ad32c22a1cd0f86f5f20ea53a5ab

    - name: Install dependencies
      run: |
          python -m pip install --upgrade pip
          python -m pip install invoke .[test]

    - name: Run unit tests
      run: invoke unit

    # CINTENT >> REMOVE_UPLOADS
    # - if: matrix.os == 'ubuntu-latest' && matrix.python-version == 3.8
    #   name: Upload codecov report
    #   uses: codecov/codecov-action@v4

    # CINTENT >> INSERT_CINTENT
    - name: Upload CIntent Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ env.CINTENT_ARTIFACT_NAME }}
        path: ${{ env.CINTENT_LOGS }}
